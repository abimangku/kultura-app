services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs:ro
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - ./proxy.conf:/etc/nginx/conf.d/custom-proxy.conf:ro
      - ./kultura-development.kinderheim511.com_location:/etc/nginx/vhost.d/kultura-development.kinderheim511.com_location:ro
      - ./kulturaproperties.com_location:/etc/nginx/vhost.d/kulturaproperties.com_location:ro
      - /home/ubuntu/home/kultura-app/public/images:/usr/share/nginx/static/images:ro
      - /home/ubuntu/home/kultura-app/public/videos:/usr/share/nginx/static/videos:ro
    networks:
      - proxy-network

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: acme-companion
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      - DEFAULT_EMAIL=${EMAIL}
      - NGINX_PROXY_CONTAINER=nginx-proxy
    depends_on:
      - nginx-proxy
    networks:
      - proxy-network

volumes:
  certs:
  vhost:
  html:
  acme:

networks:
  proxy-network:
    name: proxy-network
    driver: bridge
